<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#09090b"/>
  <!-- 3-segment wheel: purple (T), cyan (G), pink (S) -->
  <path d="M16 16 L16 2 A14 14 0 0 1 28.12 23 Z" fill="#8b5cf6"/>
  <path d="M16 16 L28.12 23 A14 14 0 0 1 3.88 23 Z" fill="#22d3ee"/>
  <path d="M16 16 L3.88 23 A14 14 0 0 1 16 2 Z" fill="#ec4899"/>
  <!-- Dividers -->
  <line x1="16" y1="2" x2="16" y2="16" stroke="#09090b" stroke-width="1.2"/>
  <line x1="28.12" y1="23" x2="16" y2="16" stroke="#09090b" stroke-width="1.2"/>
  <line x1="3.88" y1="23" x2="16" y2="16" stroke="#09090b" stroke-width="1.2"/>
  <!-- Hub -->
  <circle cx="16" cy="16" r="3" fill="#09090b"/>
  <circle cx="16" cy="16" r="1.8" fill="#e4e4e7"/>
  <!-- Letters -->
  <text x="23" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-weight="900" font-size="6" fill="#fff">T</text>
  <text x="16" y="23.5" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-weight="900" font-size="6" fill="#fff">G</text>
  <text x="9" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-weight="900" font-size="6" fill="#fff">S</text>
</svg>
