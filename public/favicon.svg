<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#09090b"/>
  <!-- T centered at top, G bottom-right, S bottom-left — reads T G S clockwise -->
  <path d="M16 16 L3.88 9 A14 14 0 0 1 28.12 9 Z" fill="#dc2626"/>
  <path d="M16 16 L28.12 9 A14 14 0 0 1 16 30 Z" fill="#7c3aed"/>
  <path d="M16 16 L16 30 A14 14 0 0 1 3.88 9 Z" fill="#16a34a"/>
  <!-- Dividers -->
  <line x1="16" y1="16" x2="3.88" y2="9" stroke="#09090b" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="28.12" y2="9" stroke="#09090b" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="16" y2="30" stroke="#09090b" stroke-width="1.2"/>
  <!-- Hub -->
  <circle cx="16" cy="16" r="3" fill="#09090b"/>
  <circle cx="16" cy="16" r="1.8" fill="#e4e4e7"/>
  <!-- Letters -->
  <text x="16" y="8"  text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-weight="900" font-size="6" fill="#fff">T</text>
  <text x="23" y="20" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-weight="900" font-size="6" fill="#fff">G</text>
  <text x="9"  y="20" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-weight="900" font-size="6" fill="#fff">S</text>
</svg>
