<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — The Game Show</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:2rem; }
    .form-card { width:100%; max-width:360px; }
    .field { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
    .field label { font-size:.78rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
    .divider { display:flex; align-items:center; gap:.75rem; color:var(--muted); font-size:.8rem; margin:.75rem 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .g-btn { display:flex; align-items:center; justify-content:center; gap:.65rem; background:#fff; border:none; border-radius:9px; padding:.7rem 1.5rem; cursor:pointer; font-weight:700; font-size:.9rem; color:#09090b; font-family:'DM Sans',sans-serif; width:100%; transition:opacity .15s; }
    .g-btn:hover { opacity:.9; }
  </style>
</head>
<body>
  <div class="form-card">
    <div style="text-align:center;margin-bottom:2rem">
      <a href="/" style="text-decoration:none">
        <div class="wordmark" style="font-size:2rem">The<span class="accent">.</span> Game Show</div>
      </a>
      <p style="color:var(--muted);font-size:.88rem;margin-top:.5rem">Create your host account</p>
    </div>

    <div class="card">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" class="input" placeholder="you@example.com" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" class="input" placeholder="Min 8 characters">
      </div>
      <button id="signup-btn" class="btn btn-primary btn-block" onclick="doSignup()">Create Account</button>
      <div id="error" style="color:#f87171;font-size:.82rem;margin-top:.75rem;display:none"></div>

      <div class="divider">or</div>

      <button class="g-btn" onclick="googleSignup()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <p style="text-align:center;font-size:.82rem;color:var(--muted);margin-top:1.25rem">
      Already have an account? <a href="/host" style="color:var(--purple-lt)">Sign in</a>
    </p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCmreMjOBtmFa9sy7c-CARsnCGBy2OUETk",
      authDomain: "thegameshow.firebaseapp.com",
      projectId: "thegameshow",
      storageBucket: "thegameshow.firebasestorage.app",
      messagingSenderId: "561633423119",
      appId: "1:561633423119:web:c0480a7e4502d4256a587a"
    });
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user) window.location.href = '/host';
    });

    function showErr(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = '';
    }

    const errMap = {
      'auth/email-already-in-use': 'An account with that email already exists.',
      'auth/invalid-email':        'Invalid email address.',
      'auth/weak-password':        'Password must be at least 6 characters.',
    };

    async function doSignup() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const btn   = document.getElementById('signup-btn');
      document.getElementById('error').style.display = 'none';
      if (!email || !pass) { showErr('Please fill in all fields.'); return; }
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        await auth.createUserWithEmailAndPassword(email, pass);
      } catch (e) {
        showErr(errMap[e.code] || 'Something went wrong. Try again.');
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    async function googleSignup() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') showErr('Sign-in failed — try again.');
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSignup();
    });
  </script>
</body>
</html>
